<!DOCTYPE html>
<html>
<head>
  <title>Colored Table</title>
</head>
<body>
  <table border="1" style="border-collapse: collapse;">
    <tr style="background-color: lightgrey;">
      <th>Name</th>
      <th>Age</th>
      <th>City</th>
    </tr>
    <tr>
      <td>Rahul</td>
      <td>20</td>
      <td>Jaipur</td>
    </tr>
    <tr>
      <td>Anita</td>
      <td>22</td>
      <td>Delhi</td>
    </tr>
  </table>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Lists</title>
</head>
<body>
  <h2>Fruits (Unordered)</h2>
  <ul>
    <li>Apple</li>
    <li>Mango</li>
    <li>Banana</li>
  </ul>

  <h2>Fruits (Ordered)</h2>
  <ol>
    <li>Apple</li>
    <li>Mango</li>
    <li>Banana</li>
  </ol>
</body>
</html>
